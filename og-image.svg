<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060910"/>
      <stop offset="100%" style="stop-color:#0c1018"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="60%" r="40%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="arrow_grad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0"/>
      <stop offset="40%" style="stop-color:#38bdf8;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:1"/>
    </linearGradient>
    <filter id="logo_glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg_grad)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Border -->
  <rect x="1" y="1" width="1198" height="628" rx="0" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="none"/>

  <!-- LEFT: Logo mark -->
  <g transform="translate(80, 185)" filter="url(#logo_glow)">
    <!-- Top :: arrow -->
    <circle cx="28" cy="68" r="14" fill="#38bdf8" opacity="0.4"/>
    <circle cx="28" cy="108" r="14" fill="#38bdf8" opacity="0.4"/>
    <path d="M56 78H160L148 34C148 26 158 22 164 28L224 64C230 68 230 76 224 80L164 116C158 122 148 118 148 110L160 88H56V78Z" fill="url(#arrow_grad)"/>
    <!-- Bottom :: arrow -->
    <circle cx="48" cy="158" r="14" fill="#38bdf8" opacity="0.4"/>
    <circle cx="48" cy="198" r="14" fill="#38bdf8" opacity="0.4"/>
    <path d="M76 168H180L168 124C168 116 178 112 184 118L244 154C250 158 250 166 244 170L184 206C178 212 168 208 168 200L180 178H76V168Z" fill="url(#arrow_grad)"/>
    <!-- Bracket -->
    <path d="M272 20C292 20 304 34 304 56V210C304 232 292 246 272 246" stroke="rgba(248,250,252,0.5)" stroke-width="20" stroke-linecap="round"/>
  </g>

  <!-- RIGHT: Text content -->
  <!-- AniScript wordmark -->
  <text x="430" y="230" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="72" fill="#f0f4ff" letter-spacing="-3">AniScript</text>

  <!-- Tagline line 1 -->
  <text x="432" y="300" font-family="system-ui, -apple-system, sans-serif" font-weight="300" font-size="28" fill="#8896b3">Animate anything.</text>
  <!-- Tagline line 2 - gradient -->
  <text x="432" y="340" font-family="system-ui, -apple-system, sans-serif" font-weight="300" font-size="28" fill="#38bdf8">Write almost nothing.</text>

  <!-- Divider -->
  <line x1="432" y1="372" x2="900" y2="372" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Stats row -->
  <text x="432" y="410" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="22" fill="#38bdf8">53 animations</text>
  <text x="432" y="438" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="16" fill="#4a5568">Hardware-accelerated · Zero dependencies · ~4kb runtime</text>

  <!-- Badge -->
  <rect x="432" y="468" width="148" height="34" rx="17" fill="rgba(56,189,248,0.1)" stroke="rgba(56,189,248,0.25)" stroke-width="1"/>
  <text x="506" y="490" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="13" fill="#38bdf8" text-anchor="middle">v1.1.4 — on npm</text>

  <!-- DSL code snippet -->
  <rect x="700" y="380" width="400" height="130" rx="12" fill="#141c2b" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="724" y="412" font-family="monospace" font-size="14" fill="#64748b">::</text>
  <text x="742" y="412" font-family="monospace" font-size="14" fill="#38bdf8"> fade-up </text>
  <text x="822" y="412" font-family="monospace" font-size="14" fill="#475569">| </text>
  <text x="836" y="412" font-family="monospace" font-size="14" fill="#a78bfa">@200ms </text>
  <text x="900" y="412" font-family="monospace" font-size="14" fill="#64748b">:: {</text>
  <text x="724" y="438" font-family="monospace" font-size="14" fill="#e2e8f0">  &lt;h1&gt;Hello World&lt;/h1&gt;</text>
  <text x="724" y="464" font-family="monospace" font-size="14" fill="#f472b6">}</text>
  <text x="724" y="494" font-family="monospace" font-size="12" fill="#374151" font-style="italic">// compiles to semantic HTML</text>
</svg>
